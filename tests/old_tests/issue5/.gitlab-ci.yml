stages:
- test
# - build
- analyze
- staging

# To get Django tests to work you may need to create a settings file using
# the following DATABASES:
#
# DATABASES = {
#     'default': {
#        'ENGINE': 'django.db.backends.postgresql_psycopg2',
#        'NAME': 'ci',
#        'USER': 'postgres',
#        'PASSWORD': 'postgres',
#        'HOST': 'postgres',
#        'PORT': '5432',
#    },
# }
#
# and then adding `--settings app.settings.ci` (or similar) to the test command

test:
  stage: test
  image: python:latest
  services:
  - postgres:latest
  variables:
    POSTGRES_DB: ci
    DJANGO_SETTINGS_MODULE: "vxl_intra.settings.ci"
    DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/$POSTGRES_DB"
  cache:
    paths:
    - .pip
  before_script:
  - python -V
  - pip --cache-dir=.pip install -r requirements.txt
  script:
  - python manage.py makemigrations
  - python manage.py migrate
  - python manage.py check --fail-level WARNING
  # - python manage.py check --deploy --fail-level ERROR
  # - python manage.py test
  - coverage run manage.py test --noinput
  - coverage report

lint:
  stage: test
  when: manual
  allow_failure: true
  image: python:latest
  cache:
    paths:
    - .pip
  before_script:
  - python -V
  - pip --cache-dir=.pip install -r requirements.txt
  script:
  # This can be run in parallel with -j <number_of_cores>
  - pylint --load-plugins pylint_django manage.py vxl_intra vxl_db

graph:
  stage: analyze
  when: manual
  image: python:latest
  cache:
    paths:
    - .pip
  before_script:
  - python -V
  - pip --cache-dir=.pip install -r requirements.txt
  - apt-get update -qq
  - apt-get install -y -qq graphviz
  script:
  - pyreverse ./vxl_db -o svg
  artifacts:
    paths:
    - classes.svg
    - packages.svg

cloc:
  stage: analyze
  when: manual
  image: alpine:latest
  before_script:
  - apk update
  - apk add cloc
  script:
  - cloc . --exclude-dir=fixtures --report-file=cloc.txt
  artifacts:
    paths:
    - cloc.txt

deploy_staging:
  stage: staging
  when: manual
  image: ruby:latest
  # Variables should be set at Heroku
  # variables:
  #   DJANGO_SETTINGS_MODULE: "vxl_intra.settings.staging"
  script:
  # - apt-get update -qy
  # - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=vxl-intra-staging --api-key=$HEROKU_API_KEY
  environment:
    name: staging
    url: https://vxl-intra-staging.herokuapp.com/
  only:
  - master

.deploy_production:
  stage: production
  variables:
    DJANGO_SETTINGS_MODULE: "vxl_intra.settings.production"
  script:
  environment:
    name: production
  only:
  - master
  when: manual
